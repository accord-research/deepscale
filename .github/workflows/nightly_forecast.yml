# .github/workflows/nightly_forecast.yml
name: Nightly Forecast

on:
  # Schedule is commented out until the first manual workflow_dispatch run
  # completes cleanly end-to-end. Uncomment, then commit, to enable.
  # schedule:
  #   - cron: "0 2 * * *"   # 02:00 UTC daily
  workflow_dispatch:
    inputs:
      only_country:
        description: "Run only this country (kenya|ethiopia|nigeria) or empty for all"
        required: false
        default: ""

permissions:
  contents: write  # publish.py pushes to gh-pages

jobs:
  forecast:
    runs-on: ubuntu-latest
    timeout-minutes: 350  # 5h50m, just inside the 6h GHA cap
    strategy:
      fail-fast: false
      matrix:
        country: [kenya, ethiopia, nigeria]
    steps:
      - name: Skip if only_country filter excludes this matrix entry
        id: gate
        run: |
          only="${{ github.event.inputs.only_country }}"
          if [ -n "$only" ] && [ "$only" != "${{ matrix.country }}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.gate.outputs.skip == 'false'
        uses: actions/checkout@v4

      - if: steps.gate.outputs.skip == 'false'
        name: Checkout rosetta alongside deepscale
        uses: actions/checkout@v4
        with:
          repository: accord-research/rosetta
          path: rosetta

      - if: steps.gate.outputs.skip == 'false'
        name: Pin RUN_DATE for this job (avoids midnight-UTC drift across steps)
        run: echo "RUN_DATE=$(date -u +%Y-%m-%d)" >> "$GITHUB_ENV"

      - if: steps.gate.outputs.skip == 'false'
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - if: steps.gate.outputs.skip == 'false'
        name: Install deepscale (with PyYAML + matplotlib)
        run: |
          uv sync --extra dev --extra plot

      - if: steps.gate.outputs.skip == 'false'
        name: Install rosetta into the deepscale env
        run: |
          uv pip install -e ./rosetta

      - if: steps.gate.outputs.skip == 'false'
        name: Configure CDS credentials
        env:
          CDSAPI_URL: ${{ secrets.CDSAPI_URL }}
          CDSAPI_KEY: ${{ secrets.CDSAPI_KEY }}
        run: |
          mkdir -p ~/.config
          printf "url: %s\nkey: %s\n" "$CDSAPI_URL" "$CDSAPI_KEY" > ~/.cdsapirc

      - if: steps.gate.outputs.skip == 'false'
        name: Restore CDS cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/rosetta/cds
          # Key on the country + a content hash of the config that drives
          # downloads. Cache invalidates only when models/region/period change.
          key: cds-${{ matrix.country }}-${{ hashFiles('scripts/nightly/countries.yml') }}
          restore-keys: |
            cds-${{ matrix.country }}-

      - if: steps.gate.outputs.skip == 'false'
        name: Run pipeline for ${{ matrix.country }}
        id: run
        run: |
          uv run python -m scripts.nightly.run_country \
            --country ${{ matrix.country }} \
            --today "$RUN_DATE" \
            --output-root output/

      - if: steps.gate.outputs.skip == 'false'
        name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nightly-${{ matrix.country }}
          path: output/${{ matrix.country }}/
          if-no-files-found: warn
          retention-days: 30

      - if: steps.gate.outputs.skip == 'false'
        name: Compute expected targets for this country (for the gather job)
        env:
          MATRIX_COUNTRY: ${{ matrix.country }}
        run: |
          mkdir -p expected
          uv run python -c "
          import json, os, pathlib, sys
          from datetime import date
          sys.path.insert(0, '.')
          from scripts.nightly.config import load_config
          from scripts.nightly.select_targets import select_targets
          country = os.environ['MATRIX_COUNTRY']
          cfg = load_config('scripts/nightly/countries.yml')
          today = date.fromisoformat(os.environ['RUN_DATE'])
          ts = [
              [t.country, t.season, t.init_year, t.init_month]
              for t in select_targets(cfg, today) if t.country == country
          ]
          pathlib.Path(f'expected/{country}.json').write_text(json.dumps(ts))
          "

      - if: steps.gate.outputs.skip == 'false'
        name: Upload expected-targets manifest
        uses: actions/upload-artifact@v4
        with:
          name: expected-${{ matrix.country }}
          path: expected/${{ matrix.country }}.json
          if-no-files-found: error

  publish:
    needs: forecast
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0    # publish.py needs all refs to fetch gh-pages

      - name: Pin RUN_DATE for this job
        run: echo "RUN_DATE=$(date -u +%Y-%m-%d)" >> "$GITHUB_ENV"

      - uses: astral-sh/setup-uv@v6
      - run: uv sync --extra dev

      - name: Download all country artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded/

      - name: Stage artifacts into ./artifacts/<country>/<season>/<init>/
        run: |
          mkdir -p artifacts
          for d in downloaded/nightly-*; do
            [ -d "$d" ] || continue
            country=$(basename "$d" | sed 's/nightly-//')
            mkdir -p "artifacts/$country"
            cp -r "$d"/* "artifacts/$country"/
          done

      - name: Concatenate per-country expected manifests
        run: |
          uv run python -c "
          import json, glob
          combined = []
          for path in sorted(glob.glob('downloaded/expected-*/*.json')):
              combined.extend(json.load(open(path)))
          open('expected.json','w').write(json.dumps(combined))
          print(combined)
          "

      - name: Checkout gh-pages into ./site
        # Requires gh-pages to exist on the remote (one-time bootstrap done
        # via Task 11 of the implementation plan). Fail loudly if missing so
        # the operator is pointed at the bootstrap step.
        run: |
          if ! git ls-remote --exit-code --heads origin gh-pages >/dev/null; then
            echo "::error::gh-pages branch not found on origin. Bootstrap it first" \
                 "(see docs/superpowers/plans/2026-05-16-nightly-forecast-workflow.md Task 11)."
            exit 1
          fi
          git fetch origin gh-pages:gh-pages
          git worktree add site gh-pages

      - name: Run publish.py
        run: |
          uv run python -m scripts.nightly.publish \
            --artifacts-root artifacts/ \
            --site-root site/ \
            --run-date "$RUN_DATE" \
            --commit-sha ${{ github.sha }} \
            --expected "$(cat expected.json)"

      - name: Commit + push gh-pages
        run: |
          cd site
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to publish."
            exit 0
          fi
          git commit -m "nightly: $RUN_DATE"
          for i in 1 2 3; do
            if git push origin gh-pages; then
              echo "Pushed on attempt $i."
              exit 0
            fi
            echo "Push attempt $i failed; rebasing and retrying."
            if ! git pull --rebase origin gh-pages; then
              echo "::error::rebase against gh-pages failed; aborting."
              exit 1
            fi
            sleep $((i * 5))
          done
          echo "::error::push failed after 3 attempts."
          exit 1
