# .github/workflows/rebench_forecast.yml
#
# Mode B — re-run every historical operational forecast under current
# deepscale and append rebench rows to metrics.json. The "as deepscale
# evolves, does the same historical forecast get better?" signal.
#
# Reads the existing gh-pages metrics.json (kind=operational, status=ok),
# extracts unique (country, season, init_year, init_month) tuples, optionally
# filters by --since_days, and runs the pipeline per country in a matrix.
#
# Fires on nightly cron + manual workflow_dispatch. No dedupe: every run
# appends a fresh rebench row tagged with the current commit. The dashboard
# handles dedupe-by-commit at read time.

name: Rebench Forecast

on:
  # Schedule is commented out until the first manual workflow_dispatch run
  # completes cleanly end-to-end. Uncomment, then commit, to enable.
  # schedule:
  #   - cron: "30 3 * * *"   # 03:30 UTC daily, offset from nightly_forecast
  workflow_dispatch:
    inputs:
      only_country:
        description: "Run only this country (kenya|ethiopia|nigeria) or empty for all"
        required: false
        default: ""
      since_days:
        description: "Only re-run operational rows newer than N days. Empty = all history."
        required: false
        default: ""

permissions:
  contents: write  # publish.py pushes to gh-pages

jobs:
  build-catalog:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      has_targets: ${{ steps.compute.outputs.has_targets }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - run: uv sync --extra dev

      - name: Fetch gh-pages and extract operational catalog
        id: compute
        env:
          ONLY_COUNTRY: ${{ github.event.inputs.only_country }}
          SINCE_DAYS: ${{ github.event.inputs.since_days }}
        run: |
          git fetch origin gh-pages:gh-pages
          git worktree add site gh-pages

          uv run python -c "
          import json, os, pathlib
          from datetime import date, timedelta

          site = pathlib.Path('site')
          metrics_path = site / 'metrics.json'
          rows = json.loads(metrics_path.read_text()) if metrics_path.exists() else []

          only_country = os.environ.get('ONLY_COUNTRY') or ''
          since_raw = os.environ.get('SINCE_DAYS') or ''

          cutoff = None
          if since_raw.strip():
              cutoff = date.today() - timedelta(days=int(since_raw))

          tuples = set()
          for r in rows:
              if r.get('kind', 'operational') != 'operational':
                  continue
              if r.get('status') != 'ok':
                  continue
              if only_country and r['country'] != only_country:
                  continue
              if cutoff is not None and date.fromisoformat(r['date']) < cutoff:
                  continue
              iy, im = r['init'].split('-')
              tuples.add((r['country'], r['season'], int(iy), int(im)))

          targets = sorted(list(t) for t in tuples)
          pathlib.Path('catalog.json').write_text(json.dumps(targets))
          print(f'Catalog size: {len(targets)} (country, season, init) tuples')
          # Group by country for the matrix.
          by_country = {}
          for c, s, iy, im in targets:
              by_country.setdefault(c, []).append([c, s, iy, im])
          pathlib.Path('catalog_by_country.json').write_text(json.dumps(by_country))
          print('Per-country counts:', {k: len(v) for k, v in by_country.items()})
          has_targets = 'true' if targets else 'false'
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'has_targets={has_targets}\n')
          "

      - name: Upload catalog
        if: steps.compute.outputs.has_targets == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: rebench-catalog
          path: |
            catalog.json
            catalog_by_country.json
          if-no-files-found: error

  rebench:
    needs: build-catalog
    if: needs.build-catalog.outputs.has_targets == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 350
    strategy:
      fail-fast: false
      matrix:
        country: [kenya, ethiopia, nigeria]
    steps:
      - name: Skip if only_country filter excludes this matrix entry
        id: gate
        run: |
          only="${{ github.event.inputs.only_country }}"
          if [ -n "$only" ] && [ "$only" != "${{ matrix.country }}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.gate.outputs.skip == 'false'
        uses: actions/checkout@v4

      - if: steps.gate.outputs.skip == 'false'
        name: Checkout rosetta alongside deepscale
        uses: actions/checkout@v4
        with:
          repository: accord-research/rosetta
          path: rosetta

      - if: steps.gate.outputs.skip == 'false'
        name: Pin RUN_DATE for this job
        run: echo "RUN_DATE=$(date -u +%Y-%m-%d)" >> "$GITHUB_ENV"

      - if: steps.gate.outputs.skip == 'false'
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - if: steps.gate.outputs.skip == 'false'
        run: uv sync --extra dev --extra plot

      - if: steps.gate.outputs.skip == 'false'
        run: uv pip install -e ./rosetta

      - if: steps.gate.outputs.skip == 'false'
        name: Configure CDS credentials
        env:
          CDSAPI_URL: ${{ secrets.CDSAPI_URL }}
          CDSAPI_KEY: ${{ secrets.CDSAPI_KEY }}
        run: |
          mkdir -p ~/.config
          printf "url: %s\nkey: %s\n" "$CDSAPI_URL" "$CDSAPI_KEY" > ~/.cdsapirc

      - if: steps.gate.outputs.skip == 'false'
        name: Restore CDS cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/rosetta/cds
          key: cds-${{ matrix.country }}-${{ hashFiles('scripts/nightly/countries.yml') }}
          restore-keys: |
            cds-${{ matrix.country }}-

      - if: steps.gate.outputs.skip == 'false'
        name: Download catalog
        uses: actions/download-artifact@v4
        with:
          name: rebench-catalog
          path: catalog-dl/

      - if: steps.gate.outputs.skip == 'false'
        name: Extract this country's targets
        env:
          MATRIX_COUNTRY: ${{ matrix.country }}
        run: |
          uv run python -c "
          import json, os, pathlib
          country = os.environ['MATRIX_COUNTRY']
          by_country = json.loads(pathlib.Path('catalog-dl/catalog_by_country.json').read_text())
          targets = by_country.get(country, [])
          pathlib.Path('targets.json').write_text(json.dumps(targets))
          print(f'{country}: {len(targets)} targets to rebench')
          "

      - if: steps.gate.outputs.skip == 'false'
        name: Rebench pipeline for ${{ matrix.country }}
        run: |
          uv run python -m scripts.nightly.run_country \
            --country ${{ matrix.country }} \
            --today "$RUN_DATE" \
            --output-root output/ \
            --kind rebench \
            --targets-file targets.json

      - if: steps.gate.outputs.skip == 'false'
        name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rebench-${{ matrix.country }}
          path: output/${{ matrix.country }}/
          if-no-files-found: warn
          retention-days: 30

      - if: steps.gate.outputs.skip == 'false'
        name: Upload per-country expected manifest (= targets fed to run_country)
        uses: actions/upload-artifact@v4
        with:
          name: rebench-expected-${{ matrix.country }}
          path: targets.json
          if-no-files-found: error

  publish:
    needs: [build-catalog, rebench]
    if: always() && needs.build-catalog.outputs.has_targets == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pin RUN_DATE for this job
        run: echo "RUN_DATE=$(date -u +%Y-%m-%d)" >> "$GITHUB_ENV"

      - uses: astral-sh/setup-uv@v6
      - run: uv sync --extra dev

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded/

      - name: Stage country artifacts into ./artifacts/<country>/
        run: |
          mkdir -p artifacts
          for d in downloaded/rebench-kenya downloaded/rebench-ethiopia downloaded/rebench-nigeria; do
            [ -d "$d" ] || continue
            country=$(basename "$d" | sed 's/rebench-//')
            mkdir -p "artifacts/$country"
            cp -r "$d"/* "artifacts/$country"/
          done

      - name: Concatenate per-country expected manifests
        run: |
          uv run python -c "
          import json, glob
          combined = []
          for path in sorted(glob.glob('downloaded/rebench-expected-*/targets.json')):
              combined.extend(json.load(open(path)))
          open('expected.json','w').write(json.dumps(combined))
          print(f'Total rebench expected: {len(combined)} entries')
          "

      - name: Checkout gh-pages into ./site
        run: |
          if ! git ls-remote --exit-code --heads origin gh-pages >/dev/null; then
            echo "::error::gh-pages branch not found on origin."
            exit 1
          fi
          git fetch origin gh-pages:gh-pages
          git worktree add site gh-pages

      - name: Run publish.py (kind=rebench)
        run: |
          uv run python -m scripts.nightly.publish \
            --artifacts-root artifacts/ \
            --site-root site/ \
            --run-date "$RUN_DATE" \
            --commit-sha ${{ github.sha }} \
            --expected "$(cat expected.json)" \
            --kind rebench

      - name: Commit + push gh-pages
        run: |
          cd site
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to publish."
            exit 0
          fi
          git commit -m "rebench: $RUN_DATE"
          for i in 1 2 3; do
            if git push origin gh-pages; then
              echo "Pushed on attempt $i."
              exit 0
            fi
            echo "Push attempt $i failed; rebasing and retrying."
            if ! git pull --rebase origin gh-pages; then
              echo "::error::rebase against gh-pages failed; aborting."
              exit 1
            fi
            sleep $((i * 5))
          done
          echo "::error::push failed after 3 attempts."
          exit 1
