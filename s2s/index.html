<!doctype html>
<html lang='en'><head><meta charset='utf-8'>
<meta name='viewport' content='width=device-width, initial-scale=1'>
<title>S2S testbed dashboard</title>
<link rel='stylesheet' href='../theme.css'>
</head><body>
<header><p><a href='../'>&larr; All forecasts</a></p>
<h1>Sub-seasonal (S2S) testbed</h1></header>
<h2>Forecast vs. observed &mdash; explore by issuance</h2>
<p class='controls'><label>Country: <select id='sel-country'></select></label> <label>Issuance: <select id='sel-issuance'></select></label> <label><input type='checkbox' id='full-only' checked> Full weeks only (with downscaling)</label></p><img id='comparison' alt='forecast vs observed comparison grid'>
<script>
const COMPARISONS = {"ethiopia": [{"d": "2026-07-09", "full": true, "obs": false}, {"d": "2026-07-06", "full": false, "obs": false}, {"d": "2026-07-02", "full": false, "obs": false}, {"d": "2026-06-29", "full": true, "obs": true}, {"d": "2026-06-25", "full": true, "obs": true}, {"d": "2026-06-22", "full": false, "obs": true}, {"d": "2026-06-18", "full": false, "obs": true}, {"d": "2026-06-15", "full": true, "obs": true}, {"d": "2026-06-11", "full": true, "obs": true}, {"d": "2026-06-08", "full": false, "obs": true}, {"d": "2026-06-04", "full": false, "obs": true}, {"d": "2026-06-01", "full": true, "obs": true}, {"d": "2026-05-28", "full": false, "obs": true}, {"d": "2026-05-25", "full": true, "obs": true}, {"d": "2026-05-21", "full": true, "obs": true}, {"d": "2026-05-18", "full": false, "obs": true}, {"d": "2026-05-14", "full": false, "obs": true}, {"d": "2026-05-11", "full": true, "obs": true}, {"d": "2026-05-07", "full": true, "obs": true}, {"d": "2026-05-04", "full": false, "obs": true}, {"d": "2026-04-30", "full": false, "obs": true}, {"d": "2026-04-27", "full": true, "obs": true}, {"d": "2026-04-23", "full": true, "obs": true}, {"d": "2026-04-20", "full": false, "obs": true}, {"d": "2026-04-16", "full": false, "obs": true}, {"d": "2026-04-13", "full": true, "obs": true}], "kenya": [{"d": "2026-07-09", "full": true, "obs": false}, {"d": "2026-07-06", "full": false, "obs": false}, {"d": "2026-07-02", "full": false, "obs": false}, {"d": "2026-06-29", "full": true, "obs": true}, {"d": "2026-06-25", "full": true, "obs": true}, {"d": "2026-06-22", "full": false, "obs": true}, {"d": "2026-06-18", "full": false, "obs": true}, {"d": "2026-06-15", "full": true, "obs": true}, {"d": "2026-06-11", "full": true, "obs": true}, {"d": "2026-06-08", "full": false, "obs": true}, {"d": "2026-06-04", "full": false, "obs": true}, {"d": "2026-06-01", "full": true, "obs": true}, {"d": "2026-05-28", "full": false, "obs": true}, {"d": "2026-05-25", "full": true, "obs": true}, {"d": "2026-05-21", "full": true, "obs": true}, {"d": "2026-05-18", "full": false, "obs": true}, {"d": "2026-05-14", "full": false, "obs": true}, {"d": "2026-05-11", "full": true, "obs": true}, {"d": "2026-05-07", "full": true, "obs": true}, {"d": "2026-05-04", "full": false, "obs": true}, {"d": "2026-04-30", "full": false, "obs": true}, {"d": "2026-04-27", "full": true, "obs": true}, {"d": "2026-04-23", "full": true, "obs": true}, {"d": "2026-04-20", "full": false, "obs": true}, {"d": "2026-04-16", "full": false, "obs": true}, {"d": "2026-04-13", "full": true, "obs": true}], "nigeria": [{"d": "2026-07-09", "full": true, "obs": false}, {"d": "2026-07-06", "full": false, "obs": false}, {"d": "2026-07-02", "full": false, "obs": false}, {"d": "2026-06-29", "full": true, "obs": true}, {"d": "2026-06-25", "full": true, "obs": true}, {"d": "2026-06-22", "full": false, "obs": true}, {"d": "2026-06-18", "full": false, "obs": true}, {"d": "2026-06-15", "full": true, "obs": true}, {"d": "2026-06-11", "full": true, "obs": true}, {"d": "2026-06-08", "full": false, "obs": true}, {"d": "2026-06-04", "full": false, "obs": true}, {"d": "2026-06-01", "full": true, "obs": true}, {"d": "2026-05-28", "full": false, "obs": true}, {"d": "2026-05-25", "full": true, "obs": true}, {"d": "2026-05-21", "full": true, "obs": true}, {"d": "2026-05-18", "full": false, "obs": true}, {"d": "2026-05-14", "full": false, "obs": true}, {"d": "2026-05-11", "full": true, "obs": true}, {"d": "2026-05-07", "full": true, "obs": true}, {"d": "2026-05-04", "full": false, "obs": true}, {"d": "2026-04-30", "full": false, "obs": true}, {"d": "2026-04-27", "full": true, "obs": true}, {"d": "2026-04-23", "full": true, "obs": true}, {"d": "2026-04-20", "full": false, "obs": true}, {"d": "2026-04-16", "full": false, "obs": true}, {"d": "2026-04-13", "full": true, "obs": true}]};
const csel = document.getElementById('sel-country');
const isel = document.getElementById('sel-issuance');
const img = document.getElementById('comparison');
const fullOnly = document.getElementById('full-only');
for (const c of Object.keys(COMPARISONS)) {
  if (COMPARISONS[c].length) {
    const o = document.createElement('option'); o.value = c; o.textContent = c;
    csel.appendChild(o);
  }
}
function fillIssuances() {
  isel.innerHTML = '';
  const list = COMPARISONS[csel.value].filter(e => !fullOnly.checked || e.full);
  for (const e of list) {
    const o = document.createElement('option'); o.value = e.d;
    let label = e.full ? e.d : e.d + '  (baselines only)';
    if (!e.obs) label += '  · obs pending';
    o.textContent = label;
    isel.appendChild(o);
  }
  // Default to the most recent issuance that has observations (a full
  // observed | forecast | difference triptych) instead of the newest
  // date, which is usually still obs-pending.
  const withObs = list.find(e => e.obs);
  isel.value = withObs ? withObs.d : (list.length ? list[0].d : '');
}
function showComparison() {
  if (!isel.value) { img.removeAttribute('src'); img.alt = 'no issuance in view'; return; }
  img.src = csel.value + '/' + isel.value + '/comparison.png';
  img.alt = csel.value + ' ' + isel.value;
}
csel.addEventListener('change', () => { fillIssuances(); showComparison(); });
isel.addEventListener('change', showComparison);
fullOnly.addEventListener('change', () => { fillIssuances(); showComparison(); });
fillIssuances(); showComparison();
</script>
</body></html>
