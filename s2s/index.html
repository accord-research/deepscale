<!doctype html>
<html lang='en'><head><meta charset='utf-8'>
<meta name='viewport' content='width=device-width, initial-scale=1'>
<title>S2S testbed dashboard</title>
<link rel='stylesheet' href='../theme.css'>
</head><body>
<header><p><a href='../'>&larr; All forecasts</a></p>
<h1>Sub-seasonal (S2S) testbed</h1></header>
<h2>Forecast vs. observed &mdash; explore by issuance</h2>
<p class='controls'><label>Country: <select id='sel-country'></select></label> <label>Issuance: <select id='sel-issuance'></select></label></p><img id='comparison' alt='forecast vs observed comparison grid'>
<script>
const COMPARISONS = {"ethiopia": ["2026-05-25", "2026-05-21", "2026-05-18", "2026-05-14", "2026-05-11", "2026-05-07", "2026-05-04", "2026-04-30", "2026-04-27", "2026-04-23", "2026-04-20", "2026-04-16", "2026-04-13", "2026-04-09", "2026-04-06", "2026-04-02", "2026-03-30", "2026-03-26", "2026-03-23", "2026-03-19", "2026-03-16", "2026-03-12", "2026-03-09", "2026-03-05", "2026-03-02", "2026-02-26"], "kenya": ["2026-05-25", "2026-05-21", "2026-05-18", "2026-05-14", "2026-05-11", "2026-05-07", "2026-05-04", "2026-04-30", "2026-04-27", "2026-04-23", "2026-04-20", "2026-04-16", "2026-04-13", "2026-04-09", "2026-04-06", "2026-04-02", "2026-03-30", "2026-03-26", "2026-03-23", "2026-03-19", "2026-03-16", "2026-03-12", "2026-03-09", "2026-03-05", "2026-03-02", "2026-02-26"], "nigeria": ["2026-05-25", "2026-05-21", "2026-05-18", "2026-05-14", "2026-05-11", "2026-05-07", "2026-05-04", "2026-04-30", "2026-04-27", "2026-04-23", "2026-04-20", "2026-04-16", "2026-04-13", "2026-04-09", "2026-04-06", "2026-04-02", "2026-03-30", "2026-03-26", "2026-03-23", "2026-03-19", "2026-03-16", "2026-03-12", "2026-03-09", "2026-03-05", "2026-03-02", "2026-02-26"]};
const csel = document.getElementById('sel-country');
const isel = document.getElementById('sel-issuance');
const img = document.getElementById('comparison');
for (const c of Object.keys(COMPARISONS)) {
  if (COMPARISONS[c].length) {
    const o = document.createElement('option'); o.value = c; o.textContent = c;
    csel.appendChild(o);
  }
}
function fillIssuances() {
  isel.innerHTML = '';
  for (const d of COMPARISONS[csel.value]) {
    const o = document.createElement('option'); o.value = d; o.textContent = d;
    isel.appendChild(o);
  }
}
function showComparison() {
  img.src = csel.value + '/' + isel.value + '/comparison.png';
  img.alt = csel.value + ' ' + isel.value;
}
csel.addEventListener('change', () => { fillIssuances(); showComparison(); });
isel.addEventListener('change', showComparison);
fillIssuances(); showComparison();
</script>
</body></html>
