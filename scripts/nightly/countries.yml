# scripts/nightly/countries.yml
# Source of truth for the nightly forecast workflow. See
# docs/superpowers/specs/2026-05-16-nightly-forecast-workflow-design.md.

shared:
  # Rosetta product IDs. The list will grow as rosetta adds connectors;
  # start with what is already exercised by examples/demo_seasonal_mme*.py.
  models:
    - c3s/ecmwf-monthly
  observations: obs/era5
  predictand_var: prcp
  hindcast_period: [1993, 2016]
  cv: loyo
  method: cca
  cpt_args:
    n_modes: 5
    x_eof_modes: 8
    y_eof_modes: 6

countries:
  kenya:
    bbox: {west: 33.5, east: 42.0, south: -5.0, north: 5.5}
    seasons:
      MAM:
        init_months: [12, 1, 2]
        target_months: [3, 4, 5]
        season_start_month: 3
      OND:
        init_months: [7, 8, 9]
        target_months: [10, 11, 12]
        season_start_month: 10
  ethiopia:
    bbox: {west: 33.0, east: 48.0, south: 3.5, north: 15.0}
    seasons:
      JJAS:
        init_months: [3, 4, 5]
        target_months: [6, 7, 8, 9]
        season_start_month: 6
      MAM:
        init_months: [12, 1, 2]
        target_months: [3, 4, 5]
        season_start_month: 3
  nigeria:
    bbox: {west: 2.5, east: 15.0, south: 4.0, north: 14.0}
    seasons:
      JJAS:
        init_months: [3, 4, 5]
        target_months: [6, 7, 8, 9]
        season_start_month: 6
