# scripts/nightly/nightly.yml
# Source of truth for the nightly forecast workflow.
#
#
# ─────────────────────────────────────────────────────────────────────────
# Field reference (applies to each entry under `countries:` below).
# ─────────────────────────────────────────────────────────────────────────
#
# bbox
#     Geographic extent of the country, in decimal degrees. Required keys:
#     west, east, south, north. Passed verbatim to rosetta.fetch() and used
#     by deepscale to clip the predictand grid.
#
# models
#     List of GCM hindcast/forecast products used as predictors in the MME.
#     Each entry is a rosetta product ID (see rosetta/src/rosetta/catalog.yaml).
#     Available products (keep in sync with rosetta catalog as it changes):
#       C3S:  c3s/ecmwf, c3s/eccc-cansips, c3s/eccc-cansipsv3,
#             c3s/meteofrance, c3s/cmcc, c3s/dwd, c3s/ukmo, c3s/jma,
#             c3s/jma-cps2, c3s/dwd-gcfs21, c3s/ecmwf-monthly,
#             c3s/ecmwf-seas51c
#       NMME: nmme/cfsv2, nmme/ccsm4, nmme/geoss2s, nmme/gemnemo,
#             nmme/cesm1, nmme/canesm5, nmme/gem52nemo, nmme/spear,
#             nmme/spearb, nmme/cansipsic4
#             (plus -hindcast / -forecast variants where listed in the
#             catalog)
#
# observations
#     Single rosetta product ID for the verification dataset.
#     Available:
#       obs/era5     — ERA5 reanalysis (only option for temperature)
#       obs/chirps   — CHIRPS v3 monthly COGs (precip only)
#       obs/chirps-v2 — CHIRPS v2 monthly COGs (precip only)
#     We currently use obs/chirps + predictand_var=precip. ERA5 is the
#     alternative when verifying against reanalysis.
#
# predictand_var
#     Variable being forecast. Must be present in `observations` and in
#     every entry of `models` (see the `variables:` block of each product
#     in rosetta's catalog.yaml).
#     Common values: temp, precip. Also sst, where supported.
#
# hindcast_period
#     [start_year, end_year] inclusive. Calibration + cross-validation
#     window. Bounded by each GCM's `grid.hindcast_range` in rosetta's
#     catalog — the workflow will intersect this with each product's
#     availability, so the realized period may be narrower.
#
# cv
#     Cross-validation scheme name. See src/deepscale/cv.py.
#     Available:
#       loyo      — leave-one-year-out (optional `window>1` drops
#                   neighbours to break short-range autocorrelation)
#       lko       — leave k consecutive years out, sliding across the
#                   record
#       blocked   — non-overlapping contiguous blocks; optional `gap`
#                   isolates train/test across block boundaries
#       expanding — train on a growing prefix, predict the next year
#                   (mirrors real-time operational use)
#
# method
#     Statistical downscaling / calibration method. Registered in
#     src/deepscale/methods/. Must be deterministic — seasonal_mme V1
#     rejects probabilistic methods (`corrdiff` raises
#     NotImplementedError).
#     Available: cca, bcsd.
#
# cpt_args
#     Method-specific tuning. Currently consumed only by `cca`. Keys:
#       n_modes      — CCA modes
#       x_eof_modes  — predictor EOF modes
#       y_eof_modes  — predictand EOF modes
#
# seasons
#     Dict of named seasons to forecast for this country. Each entry has
#     `init_months` (which calendar months are valid issue points for
#     this season), `target_months` (the season's actual three months),
#     and `season_start_month` (used by select_targets.py to decide which
#     init is "still ahead of the season"). By default all three
#     countries share the standard 12-rolling-3-month set defined in the
#     YAML anchor below; override by replacing `seasons: *season_defaults`
#     with an inline dict.

# ─────────────────────────────────────────────────────────────────────────
# Standard 12-rolling-3-month season set. Shared across countries via the
# `*season_defaults` anchor reference below. Override per country by
# replacing the anchor with an inline dict.
# Convention: init_months are the three months immediately preceding
# season_start_month (1–3 month lead times — operational standard).
# ─────────────────────────────────────────────────────────────────────────
_season_defaults: &season_defaults
  DJF: { init_months: [9, 10, 11],  target_months: [12, 1, 2],   season_start_month: 12 }
  JFM: { init_months: [10, 11, 12], target_months: [1, 2, 3],    season_start_month: 1 }
  FMA: { init_months: [11, 12, 1],  target_months: [2, 3, 4],    season_start_month: 2 }
  MAM: { init_months: [12, 1, 2],   target_months: [3, 4, 5],    season_start_month: 3 }
  AMJ: { init_months: [1, 2, 3],    target_months: [4, 5, 6],    season_start_month: 4 }
  MJJ: { init_months: [2, 3, 4],    target_months: [5, 6, 7],    season_start_month: 5 }
  JJA: { init_months: [3, 4, 5],    target_months: [6, 7, 8],    season_start_month: 6 }
  JAS: { init_months: [4, 5, 6],    target_months: [7, 8, 9],    season_start_month: 7 }
  ASO: { init_months: [5, 6, 7],    target_months: [8, 9, 10],   season_start_month: 8 }
  SON: { init_months: [6, 7, 8],    target_months: [9, 10, 11],  season_start_month: 9 }
  OND: { init_months: [7, 8, 9],    target_months: [10, 11, 12], season_start_month: 10 }
  NDJ: { init_months: [8, 9, 10],   target_months: [11, 12, 1],  season_start_month: 11 }

countries:
  kenya:
    bbox: { west: 33.5, east: 42.0, south: -5.0, north: 5.5 }
    models:
      - c3s/ecmwf
    observations: obs/chirps
    predictand_var: precip
    hindcast_period: [1993, 2016]
    cv: loyo
    method: cca
    cpt_args:
      n_modes: 5
      x_eof_modes: 8
      y_eof_modes: 6
    seasons: *season_defaults

  ethiopia:
    bbox: { west: 33.0, east: 48.0, south: 3.5, north: 15.0 }
    models:
      - c3s/ecmwf
    observations: obs/chirps
    predictand_var: precip
    hindcast_period: [1993, 2016]
    cv: loyo
    method: cca
    cpt_args:
      n_modes: 5
      x_eof_modes: 8
      y_eof_modes: 6
    seasons: *season_defaults

  nigeria:
    bbox: { west: 2.5, east: 15.0, south: 4.0, north: 14.0 }
    models:
      - c3s/ecmwf
    observations: obs/chirps
    predictand_var: precip
    hindcast_period: [1993, 2016]
    cv: loyo
    method: cca
    cpt_args:
      n_modes: 5
      x_eof_modes: 8
      y_eof_modes: 6
    seasons: *season_defaults
