<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>DeepScale Nightly Forecasts</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js" defer></script>
  <script src="app.js" defer></script>
</head>
<body>
  <header>
    <h1>DeepScale Nightly Forecasts</h1>
    <nav>
      <button data-tab="trends" class="active">Trends</button>
      <button data-tab="forecasts">Forecasts</button>
      <button data-tab="rebench">Rebench</button>
      <button data-tab="runs">Runs</button>
    </nav>
    <p id="last-run"></p>
  </header>

  <section id="tab-trends" class="tab active">
    <div class="controls">
      <label>Country: <select id="trend-country"><option value="">All</option></select></label>
      <label>Season: <select id="trend-season"><option value="">All</option></select></label>
      <label>Metric: <select id="trend-metric">
        <option value="rpss" selected>RPSS</option>
        <option value="2afc">2AFC</option>
        <option value="pearson_r">Pearson r</option>
        <option value="heidke_skill_score">Heidke</option>
        <option value="generalized_roc">Generalised ROC</option>
        <option value="spearman">Spearman</option>
        <option value="root_mean_squared_error">RMSE</option>
      </select></label>
    </div>
    <div class="chart-wrap"><canvas id="trend-chart"></canvas></div>
    <h2>Latest skill snapshot</h2>
    <table id="latest-table"><thead>
      <tr><th>Country</th><th>Season</th><th>Init</th><th>RPSS</th><th>GROC</th><th>2AFC</th><th>Pearson r</th><th>Heidke</th></tr>
    </thead><tbody></tbody></table>
  </section>

  <section id="tab-forecasts" class="tab">
    <div class="controls">
      <label>Country: <select id="fc-country"></select></label>
      <label>Season: <select id="fc-season"></select></label>
    </div>
    <div id="fc-strip"></div>
  </section>

  <section id="tab-rebench" class="tab">
    <p class="tab-blurb">
      How does the same historical forecast score under different deepscale
      versions? Each line shows skill on a fixed (country, season, init)
      across rebench runs — x-axis is the rebench date.
    </p>
    <div class="controls">
      <label>Forecast: <select id="rb-tuple"></select></label>
      <label>Metric: <select id="rb-metric">
        <option value="rpss" selected>RPSS</option>
        <option value="2afc">2AFC</option>
        <option value="pearson_r">Pearson r</option>
        <option value="heidke_skill_score">Heidke</option>
        <option value="generalized_roc">Generalised ROC</option>
      </select></label>
    </div>
    <div class="chart-wrap"><canvas id="rebench-chart"></canvas></div>
  </section>

  <section id="tab-runs" class="tab">
    <ul id="run-list"></ul>
  </section>
</body>
</html>
