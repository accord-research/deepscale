# S2S downscaling testbed configuration.
# Add a country: copy a block, set bbox, pick methods from the registered list.
# Add a method to an existing country: append to `methods:` and ensure the
# method is registered in src/deepscale/methods/.
#
# Valid methods (as of 2026-05-21): raw, climatology, bcsd, cca, rank-analog.
# Valid obs products (rosetta): obs/chirps-v2-dekadal-rhiza (obs), obs/chirps-live-rhiza (obs_live).
# Valid forecast products (rosetta): c3s/ecmwf-s2s.

lead_days:
  min: 0
  max: 46

climatology_years: [1991, 2020]

store_root: issuances

# Render forecast-vs-obs comparison maps only for issuances within this many days
# of the most recent issuance (they sit behind the dashboard's issuance selector).
# Skill-over-time metrics always use full history. Bounded so the page, render
# time, and gh-pages branch don't grow without limit as the testbed runs for years.
comparison_window_days: 90

countries:
  kenya:
    bbox: { min_lat: -5.0, max_lat: 5.5, min_lon: 33.5, max_lon: 42.0 }
    methods: [raw, climatology, bcsd, cca, rank-analog]
    obs: obs/chirps-v2-dekadal-rhiza
    obs_live: obs/chirps-live-rhiza   # ~8-day lag, used for recent obs in verify
    forecast: c3s/ecmwf-s2s
    variable: precip

  ethiopia:
    bbox: { min_lat: 3.0, max_lat: 15.0, min_lon: 32.5, max_lon: 48.0 }
    methods: [raw, climatology, bcsd, cca, rank-analog]
    obs: obs/chirps-v2-dekadal-rhiza
    obs_live: obs/chirps-live-rhiza   # ~8-day lag, used for recent obs in verify
    forecast: c3s/ecmwf-s2s
    variable: precip

  nigeria:
    bbox: { min_lat: 4.0, max_lat: 14.0, min_lon: 2.5, max_lon: 15.0 }
    methods: [raw, climatology, bcsd, cca, rank-analog]
    obs: obs/chirps-v2-dekadal-rhiza
    obs_live: obs/chirps-live-rhiza   # ~8-day lag, used for recent obs in verify
    forecast: c3s/ecmwf-s2s
    variable: precip
